services:
  db:
    image: postgres:16-alpine
    container_name: belo-pg
    environment:
      POSTGRES_USER: belo
      POSTGRES_PASSWORD: belo123
      POSTGRES_DB: belo_challenge
      POSTGRES_MULTIPLE_DATABASES: belo_challenge,belo_challenge_test
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U belo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
